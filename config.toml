# ai-assistant — backend config template
#
# This is the ONE file you can give the backend with --config <path>.
# Every option lives here; the backend has no other flags. With no
# --config and no ./config.toml present, built-in defaults apply.
#
# All sections are optional; omit anything you're fine with default for.
# Runtime configuration (connector setup, OAuth flows, etc.) is driven
# from the client over the WebSocket — not via this file.

[server]
# Where the WebSocket listens. Use 127.0.0.1 for laptop-local; bind a
# public interface only if you're putting auth in front (e.g. SSH tunnel,
# reverse proxy with mTLS) — the backend itself has no auth layer.
addr = "127.0.0.1:8765"

[memory]
# Root of the data directory. Everything persistent lives here:
# items/, stubs/, preferences.json, embedding_model.json, hnsw/,
# connectors/<name>/, SYSTEM_MANUAL.md. Point at different paths to
# run against different datasets.
dir = "./memory"
# Soft floor for the "recent items" fallback path in retrieval. Recency
# is folded into the hybrid score now, so this is rarely load-bearing.
recent_window = 20

[claude]
# Path to the `claude` CLI binary. Usually just "claude" if it's on PATH.
binary = "claude"
# Default model for any role that doesn't override below.
model = "claude-opus-4-7"
# Per-role overrides — chosen to match each component's job. Omit to
# fall back to `model` above. Legacy alias `sanitizer_model` is still
# accepted for back-compat.
preprocessor_model         = "claude-haiku-4-5"   # runs on every msg, latency matters
assistant_model            = "claude-sonnet-4-6"  # chat; self-escalates when needed
assistant_escalation_model = "claude-opus-4-7"    # target of ESCALATE_TO_OPUS
scout_model                = "claude-sonnet-4-6"  # web triage
# Per-call timeout for any `claude` CLI invocation.
timeout_secs = 180
# Tools the Scout (and Assistant) may use.
scout_allowed_tools = ["WebSearch", "WebFetch"]

[scout]
# Periodic web/news worker. Disabled by default — Scout silently spends
# tokens in the background. Enable once you've used the assistant enough
# that there's some memory for it to infer interests from.
enabled = false
interval_minutes = 10
# Optional pinned topics. Empty list = Scout infers from memory.
pinned_topics = []

[indexer]
# Mechanical maintenance worker. No LLM calls. Backfills missing `.vec`
# sidecars, detects embedder-model changes and re-embeds, checkpoints the
# vector-index manifest. Cheap; leave enabled.
enabled = true
interval_minutes = 5
# Per-tick embedding batch size — keeps a bulk import from hammering
# the embedder all at once.
batch_size = 50

[retrieval]
# Hybrid score per candidate item:
#   final = alpha * relevance + beta * recency + gamma * importance
# relevance = max(vector_cosine, keyword_rank); recency = exp(-age/half_life).
alpha          = 0.6
beta           = 0.25
gamma          = 0.15
half_life_days = 30.0
# Candidate pool sizes — over-fetch from each leg before re-ranking.
vector_candidates  = 50
keyword_candidates = 20
recent_candidates  = 20

[logging]
# Tracing-subscriber env-filter syntax. Use one of:
#   off | error | warn | info | debug | trace        — global
#   info,backend=debug                                — per-crate override
#   info,backend::retrieval=trace                     — per-module
#
# IMPORTANT: setting a bare `debug` or `trace` applies to ALL crates,
# including dependencies. Tungstenite's per-frame trace logs include
# raw WebSocket payload bytes (= assistant replies, derived from
# personal memory). For analysis-grade verbosity, scope to our code:
#
#   level = "info,backend=trace"
#
# Our backend code is disciplined about not logging raw content;
# external libraries aren't. RUST_LOG env var still overrides.
level = "info"
# json | text. JSON is what you want when feeding logs to analysis tools
# (or to an AI for product improvement); text is more readable in a terminal.
format = "json"
# Write to stdout (live terminal) AND/OR a daily-rotated file. Both can
# be enabled simultaneously.
stdout = true
file   = true
# Where rotated log files go. Empty / omitted = <memory.dir>/logs.
# Daily rotation at midnight UTC; filename is `<file_prefix>.YYYY-MM-DD`.
# No automatic deletion — old files accumulate until you remove them.
# dir = "/var/log/ai-assistant"
file_prefix = "ai-assistant.log"
