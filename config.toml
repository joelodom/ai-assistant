# Sample config. All fields are optional; missing fields use built-in defaults.
# CLI flags (--memory-dir, --addr) override values here.

[server]
addr = "127.0.0.1:8765"

[memory]
dir = "./memory"
recent_window = 20

[claude]
binary = "claude"
# Default model for any role that doesn't override below.
model = "claude-opus-4-7"
# Per-role overrides. Omit a key to inherit `model`.
#   Sanitizer: runs on every message; Haiku is fast and reliable for OTP /
#              account-number pattern recognition + structured JSON output.
#   Assistant: inherits `model` (smartest available) — does memory-aware reasoning.
#   Curator:   destructive summarization. Mistakes are silent and permanent —
#              err toward smarter compression. Sonnet is the right balance.
#   Scout:     web summarization + triage. Sonnet is plenty; Opus is wasted.
sanitizer_model = "claude-haiku-4-5"
# assistant_model = "claude-sonnet-4-6"
curator_model   = "claude-sonnet-4-6"
scout_model     = "claude-sonnet-4-6"
timeout_secs = 180
scout_allowed_tools = ["WebSearch", "WebFetch"]

[scout]
# Off by default — Scout silently spends tokens in the background.
# Enable once you've used the assistant enough that there's some memory
# for Scout to infer interests from.
enabled = false
interval_minutes = 10
# Scout has NO hardcoded topic list. It reads your recent memory + stored
# preferences each tick and decides what to look for. Falls back to base-rate
# human interests for your location when memory is thin. Use pinned_topics
# only when you want a guaranteed sweep that doesn't rely on inference.
pinned_topics = []

[curator]
enabled = true
interval_minutes = 60
fresh_age_hours = 48
aging_age_days = 14
stale_age_days = 90
